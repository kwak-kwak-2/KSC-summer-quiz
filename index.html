<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 골든벨 빙고 시스템 - 마스터 보드</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
        }
        .neon-text-yellow {
            text-shadow: 0 0 10px rgba(234, 179, 8, 0.3), 0 0 20px rgba(234, 179, 8, 0.5);
        }
        .neon-border-blue {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }
        .fade-out {
            opacity: 0 !important;
            pointer-events: none !important;
            transition: all 0.5s ease-out;
            transform: scale(0.9);
        }
        .team-active-1 { background-color: #ef4444 !important; color: white; }
        .team-active-2 { background-color: #3b82f6 !important; color: white; }
        .team-active-3 { background-color: #10b981 !important; color: white; }
        .team-active-4 { background-color: #f59e0b !important; color: white; }
        .team-active-5 { background-color: #8b5cf6 !important; color: white; }
    </style>
</head>
<body class="p-6 overflow-x-hidden">

    <header class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
        <div>
            <h1 class="text-3xl font-black text-yellow-400 neon-text-yellow">공항성산교회 중등부 여름수련회</h1>
            <p class="text-slate-400 text-sm mt-1">실시간 스마트 골든벨 빙고 시스템 [Master Panel]</p>
        </div>
        <div class="flex gap-3">
            <button onclick="resetGame()" class="bg-red-600 hover:bg-red-700 text-white font-bold px-4 py-2 rounded shadow transition text-sm">
                게임 전체 초기화
            </button>
        </div>
    </header>

    <div class="grid grid-cols-1 xl:grid-cols-4 gap-6">
        <div class="xl:col-span-3 bg-slate-800/50 p-6 rounded-2xl border border-slate-700 backdrop-blur-sm">
            <h2 class="text-xl font-bold mb-4 text-blue-400 flex items-center gap-2">
                <span>🎯</span> 퀴즈 선택 플레이트 (번호를 클릭하여 출제)
            </h2>
            <div id="main-board" class="grid grid-cols-5 gap-4 aspect-square max-w-[750px] mx-auto"></div>
        </div>

        <div class="flex flex-col gap-4 bg-slate-900/60 p-4 rounded-2xl border border-slate-800">
            <h2 class="text-lg font-bold text-emerald-400 border-b border-slate-700 pb-2 flex items-center gap-2">
                <span>📊</span> 조별 실시간 빙고 상황
            </h2>
            <div id="teams-monitor" class="flex flex-col gap-6 overflow-y-auto max-h-[750px] pr-2"></div>
        </div>
    </div>

    <!-- 퀴즈 모달 -->
    <div id="quiz-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center hidden z-50 p-4">
        <div class="bg-slate-800 border-2 border-blue-500 rounded-3xl w-full max-w-3xl p-6 shadow-2xl neon-border-blue transform transition-all scale-100">
            
            <div class="flex justify-between items-start mb-4">
                <div>
                    <span id="modal-category" class="bg-blue-600 text-xs font-bold px-3 py-1 rounded-full text-white tracking-wide">카테고리</span>
                    <span id="modal-difficulty" class="ml-2 bg-purple-600 text-xs font-bold px-3 py-1 rounded-full text-white">난이도</span>
                </div>
                <div class="text-right">
                    <h3 id="modal-qnum" class="text-2xl font-black text-yellow-400">QUESTION 00</h3>
                </div>
            </div>

            <div class="bg-slate-900 rounded-2xl p-6 min-h-[140px] flex items-center justify-center border border-slate-700 mb-4">
                <p id="modal-content" class="text-2xl md:text-3xl font-bold text-center text-slate-100 leading-relaxed break-keep">질문 내용 로딩 중...</p>
            </div>

            <div class="mb-6 bg-slate-950 p-4 rounded-xl border border-slate-800">
                <div class="flex justify-between items-center mb-2">
                    <button id="btn-timer-toggle" onclick="toggleTimer()" class="bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold text-xs px-3 py-1 rounded shadow transition">일시정지</button>
                    <div class="text-2xl font-mono font-bold text-amber-400" id="timer-text">00:00</div>
                </div>
                <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden">
                    <div id="timer-progress" class="bg-gradient-to-r from-amber-400 to-orange-500 h-full w-full transition-all duration-1000 ease-linear"></div>
                </div>
            </div>

            <div class="mb-6">
                <h4 class="text-sm font-bold text-slate-400 mb-2 flex justify-between items-center">
                    <span>📢 실시간 조별 제출 답안</span>
                    <button onclick="revealAnswers()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold text-xs px-3 py-1 rounded shadow transition">즉시 답안 공개</button>
                </h4>
                <div id="live-answers-grid" class="grid grid-cols-5 gap-2"></div>
            </div>

            <div id="sample-answer-box" class="mb-6 p-3 bg-emerald-950/40 border border-emerald-800 rounded-lg hidden">
                <p class="text-sm text-emerald-400"><strong class="font-bold">[출제 참고 정답]:</strong> <span id="modal-sample-ans"></span></p>
            </div>

            <div class="border-t border-slate-700 pt-4 flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex flex-wrap gap-4 items-center" id="scoring-zone">
                    <span class="text-sm text-slate-300 font-bold">정답 인정 처리:</span>
                    <div class="flex gap-3">
                        <label class="inline-flex items-center gap-1.5 cursor-pointer bg-slate-700 px-2.5 py-1 rounded-md"><input type="checkbox" value="1" class="w-4 h-4 accent-red-500"> <span class="text-xs font-bold">1조</span></label>
                        <label class="inline-flex items-center gap-1.5 cursor-pointer bg-slate-700 px-2.5 py-1 rounded-md"><input type="checkbox" value="2" class="w-4 h-4 accent-blue-500"> <span class="text-xs font-bold">2조</span></label>
                        <label class="inline-flex items-center gap-1.5 cursor-pointer bg-slate-700 px-2.5 py-1 rounded-md"><input type="checkbox" value="3" class="w-4 h-4 accent-emerald-500"> <span class="text-xs font-bold">3조</span></label>
                        <label class="inline-flex items-center gap-1.5 cursor-pointer bg-slate-700 px-2.5 py-1 rounded-md"><input type="checkbox" value="4" class="w-4 h-4 accent-amber-500"> <span class="text-xs font-bold">4조</span></label>
                        <label class="inline-flex items-center gap-1.5 cursor-pointer bg-slate-700 px-2.5 py-1 rounded-md"><input type="checkbox" value="5" class="w-4 h-4 accent-purple-500"> <span class="text-xs font-bold">5조</span></label>
                    </div>
                </div>
                <div class="flex gap-2 w-full md:w-auto justify-end">
                    <button onclick="closeQuizModal(false)" class="bg-slate-600 hover:bg-slate-700 text-white font-bold px-4 py-2 rounded-xl text-sm transition">그냥 닫기</button>
                    <button onclick="submitScoring()" class="bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-black px-6 py-2 rounded-xl text-sm transition shadow-lg shadow-emerald-500/20">채점 완료 및 반영</button>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, update, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAOkTBmqBRe67qyC6b7fp0K8ONIR6XqdNk",
            authDomain: "ksc2026-summer-quiz.firebaseapp.com",
            databaseURL: "https://ksc2026-summer-quiz-default-rtdb.firebaseio.com",
            projectId: "ksc2026-summer-quiz",
            storageBucket: "ksc2026-summer-quiz.firebasestorage.app",
            messagingSenderId: "683850602432",
            appId: "1:683850602432:web:4e1614e9f6969e79c81a25"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 오디오 이펙트 객체 생성
        const sfxOpen = new Audio("https://assets.mixkit.co/active_storage/sfx/2013/2013-84.wav"); // 퀴즈 오픈 (짜잔)
        const sfxTick = new Audio("https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav"); // 일반 초침 (똑딱)
        const sfxWarning = new Audio("https://assets.mixkit.co/active_storage/sfx/951/951-84.wav"); // 5초 이하 경고음
        const sfxTimeOver = new Audio("https://assets.mixkit.co/active_storage/sfx/1013/1013-84.wav"); // 타임아웃 부저
        const sfxBingo = new Audio("https://assets.mixkit.co/active_storage/sfx/1435/1435-84.wav"); // 빙고 획득 축하 (채점 반영시 활용)

        // 볼륨 최적화 조절
        sfxTick.volume = 0.4;
        sfxWarning.volume = 0.6;

        const quizBank = {
            1: { cat: "사고력", diff: "최상", time: 180, q: "[수열 문제] 아래 빈칸에 알맞은 숫자는 무엇일까요?\n\n1, 2, 3, 5, 8, 13, (?)", ans: "21" },
            2: { cat: "논리추리", diff: "최상", time: 180, q: "3명의 용의자 A, B, C가 있다. 한 명만 진짜 범인이고 한 명만 진실을 말하고 있다. 범인은 누구인가?\n- A: 'C가 범인입니다.'\n- B: '저는 범인이 아닙니다.'\n- C: 'A는 거짓말을 하고 있어요.'", ans: "B" },
            3: { cat: "CCM초성", diff: "상", time: 120, q: "다음 초성이 가리키는 대세 CCM의 제목은 무엇일까요?\n\n[ ㅇㄱㄴ ㅎㄴㄹ ]", ans: "원하고 바라고 기도합니다 (또는 은혜 등 상황에 맞춰 채점)" },
            4: { cat: "드라마", diff: "상", time: 120, q: "드라마 '눈물의 여왕' 백현우의 레전드 취중 대사 괄호 채우기:\n'나 취하면 진짜 ( ? ) 고 귀여워서 안 된다고... 근데 왜 귀엽고 난리냐...'", ans: "말을 잘 안 듣" },
            5: { cat: "성경연산", diff: "상", time: 120, q: "다음 연산의 최종 값을 구하시오.\n\n[ 구약 성경 총 권수(39) ]  x  [ 신약 성경 총 권수(27) ]", ans: "1053" },
            6: { cat: "교회상식", diff: "중", time: 60, q: "우리 공항성산교회 중등부의 이번 2026년도 여름수련회 공식 전체 주제 타이틀은 무엇일까요?", ans: "수련회 대주제" },
            7: { cat: "성경인물", diff: "중", time: 60, q: "성경 인물 중 가장 장수했던 인물로, 총 969세를 살았던 이 사람의 이름은 무엇일까요?", ans: "므두셀라" },
            8: { cat: "일반상식", diff: "중", time: 60, q: "대한민국 50,000원권 화폐에 그려져 있는 역사의 핵심 인물은 누구일까요?", ans: "신사임당" },
            9: { cat: "역사상식", diff: "중", time: 60, q: "조선 시대 세종대왕 시절 강우량을 측정하기 위해 세계 최초로 발명된 기구의 이름은 무엇일까요?", ans: "측우기" },
            10: { cat: "찬양상식", diff: "중", time: 60, q: "워러브(WELOVE)의 대표 찬양으로, '우리는 주님을 예배하는 자들입니다...'로 시작하는 이 곡의 제목은?", ans: "입례" },
            11: { cat: "교회상식", diff: "중", time: 60, q: "예수님이 십자가에 못 박히시기 전날 밤, 제자들과 함께 마지막으로 가졌던 만찬을 무엇이라 부를까요?", ans: "최후의 만찬" },
            12: { cat: "성경지리", diff: "중", time: 60, q: "구약 성경에서 모세가 하나님으로부터 십계명 돌판을 직접 받았던 산의 이름은 무엇일까요?", ans: "시내산" },
            13: { cat: "일반상식", diff: "중", time: 60, q: "지구에서 가장 넓은 면적을 가진 대양의 명칭은 무엇일까요?", ans: "태평양" },
            14: { cat: "성경인물", diff: "중", time: 60, q: "예수님의 열두 제자 중, 예수님을 은 30에 대제사장들에게 팔아넘긴 제자의 이름은?", ans: "가룟 유다" },
            15: { cat: "넌센스", diff: "중", time: 60, q: "세상에서 가장 무서운 전화기는 무엇일까요?", ans: "무선전화기" },
            16: { cat: "팀미션", diff: "하", time: 30, q: "[즉석 미션] 조원 전체가 중앙으로 손을 모으고 힘차게 '조 구호'를 목소리 맞춰 외치세요!", ans: "성공 시 인정" },
            17: { cat: "팀미션", diff: "하", time: 30, q: "[조장 미션] 조장이 일어나서 자기 조원들의 전체 이름을 성 떼고 안 틀리고 연속으로 5초 안에 부르기!", ans: "성공 시 인정" },
            18: { cat: "팀미션", diff: "하", time: 30, q: "[몸으로 말해요] 조원 한 명이 몸으로만 '우리 교회 담임 목사님'을 묘사하여 조원들이 맞추기!", ans: "성공 시 인정" },
            19: { cat: "팀미션", diff: "하", time: 30, q: "[TMI 미션] 담당 선생님과 조원 전체가 카메라를 보며 단체로 '쌍하트 포즈'를 취하고 사진 찍기!", ans: "인증샷 확인 시 인정" },
            20: { cat: "팀미션", diff: "하", time: 30, q: "[스피드] 조원 중 한 명이 제자리멀리뛰기를 뛰어 도합 2미터 30센티미터를 넘기시오.", ans: "측정 완료 시 인정" },
            21: { cat: "성경퀴즈", diff: "하", time: 30, q: "성경의 맨 마지막 권의 이름은 무엇일까요?", ans: "요한계시록" },
            22: { cat: "성경퀴즈", diff: "하", time: 30, q: "예수님이 태어나신 유대 지역의 작은 마을 이름은 어디일까요?", ans: "베들레헴" },
            23: { cat: "교회TMI", diff: "하", time: 30, q: "우리 중등부 부장 선생님의 존함(이름)은 무엇일까요?", ans: "부장선생님 성함" },
            24: { cat: "넌센스", diff: "하", time: 30, q: "왕이 넘어지면 세 글자로 무엇이라고 할까요?", ans: "킹콩" },
            25: { cat: "일반상식", diff: "하", time: 30, q: "대한민국의 상징인 국화(나라의 꽃)의 이름은 무엇일까요?", ans: "무궁화" }
        };

        let currentActiveQId = 0;
        let timerInterval = null;
        let timeLeft = 0;
        let totalTimerTime = 0;
        let isTimerRunning = false;

        const mainBoard = document.getElementById('main-board');
        for (let i = 1; i <= 25; i++) {
            const btn = document.createElement('button');
            btn.id = `qbtn-${i}`;
            btn.className = "bg-slate-700 hover:bg-blue-600 border border-slate-600 text-2xl font-black rounded-2xl flex flex-col items-center justify-center transition p-4 shadow-md text-slate-100 hover:scale-105 active:scale-95";
            
            let badgeColor = "text-slate-400";
            if(i<=2) badgeColor="text-red-400 text-xs";
            else if(i<=5) badgeColor="text-purple-400 text-xs";
            else if(i<=15) badgeColor="text-blue-400 text-xs";
            else badgeColor="text-emerald-400 text-xs";

            btn.innerHTML = `
                <span class="text-3xl">${i}</span>
                <span class="${badgeColor} font-normal mt-1">${quizBank[i].diff}</span>
            `;
            btn.onclick = () => openQuizModal(i);
            mainBoard.appendChild(btn);
        }

        const teamsMonitor = document.getElementById('teams-monitor');
        for (let t = 1; t <= 5; t++) {
            const teamDiv = document.createElement('div');
            teamDiv.className = "bg-slate-800 p-3 rounded-xl border border-slate-700 shadow-inner";
            teamDiv.innerHTML = `
                <div class="flex justify-between items-center mb-1.5">
                    <span class="font-black text-sm text-slate-200">${t}조 현황</span>
                    <span id="team-bingo-count-${t}" class="text-xs bg-slate-900 px-2 py-0.5 rounded-full text-yellow-400 font-mono">0 Bingo</span>
                </div>
                <div id="mini-grid-${t}" class="grid grid-cols-5 gap-1 aspect-square w-full max-w-[180px] mx-auto"></div>
            `;
            teamsMonitor.appendChild(teamDiv);
            
            const miniGrid = document.getElementById(`mini-grid-${t}`);
            for(let c = 0; c < 25; c++) {
                const cell = document.createElement('div');
                cell.id = `mini-cell-${t}-${c}`;
                cell.className = "bg-slate-900 border border-slate-700/60 rounded flex items-center justify-center text-[10px] font-bold text-slate-500";
                cell.innerText = "-";
                miniGrid.appendChild(cell);
            }
        }

        for (let t = 1; t <= 5; t++) {
            onValue(ref(db, `teams/${t}`), (snapshot) => {
                const teamData = snapshot.val() || {};
                const board = teamData.bingoBoard || [];
                const answers = teamData.answers || {};
                const occupied = teamData.occupied_cells || {};

                if (board && board.length === 25) {
                    for (let i = 0; i < 25; i++) {
                        const num = board[i];
                        const cell = document.getElementById(`mini-cell-${t}-${i}`);
                        cell.innerText = num;
                        
                        if (occupied[num] === true) {
                            cell.className = `border border-transparent rounded flex items-center justify-center text-[10px] font-black team-active-${t}`;
                        } else {
                            cell.className = "bg-slate-900 border border-slate-700/60 rounded flex items-center justify-center text-[10px] font-bold text-slate-400";
                        }
                    }
                    calculateBingo(t, board, occupied);
                }

                if (currentActiveQId > 0) {
                    const ansDisplay = document.getElementById('live-ans-' + t);
                    if (ansDisplay) {
                        const submittedText = answers[currentActiveQId];
                        const txtSpan = ansDisplay.querySelector('.ans-text');
                        if (submittedText) {
                            if(txtSpan.dataset.revealed === "true") {
                                txtSpan.innerText = submittedText;
                            } else {
                                txtSpan.innerText = "제출완료 ✔";
                                txtSpan.classList.add("text-emerald-400");
                            }
                        } else {
                            txtSpan.innerText = "입력 대기 중...";
                            txtSpan.classList.remove("text-emerald-400");
                        }
                    }
                }
            });
        }

        onValue(ref(db, 'teams'), (snapshot) => {
            const allTeams = snapshot.val() || {};
            let resolvedMap = {};
            for(let t=1; t<=5; t++) {
                const occ = (allTeams[t] ? allTeams[t].occupied_cells : {}) || {};
                for(let k in occ) {
                    if(occ[k] === true) resolvedMap[k] = true;
                }
            }
            
            for(let i=1; i<=25; i++) {
                const btn = document.getElementById(`qbtn-${i}`);
                if(btn) {
                    if(resolvedMap[i] === true) btn.classList.add('fade-out');
                    else btn.classList.remove('fade-out');
                }
            }
        });

        window.calculateBingo = function(teamId, board, occupied) {
            let grid = [];
            for (let i = 0; i < 5; i++) grid.push(board.slice(i * 5, i * 5 + 5));
            let bingoCount = 0;

            for (let r = 0; r < 5; r++) {
                if (grid[r].every(num => occupied[num])) bingoCount++;
            }
            for (let c = 0; c < 5; c++) {
                if ([0,1,2,3,4].every(r => occupied[grid[r][c]])) bingoCount++;
            }
            if ([0,1,2,3,4].every(i => occupied[grid[i][i]])) bingoCount++;
            if ([0,1,2,3,4].every(i => occupied[grid[i][4 - i]])) bingoCount++;

            document.getElementById(`team-bingo-count-${teamId}`).innerText = `${bingoCount} Bingo`;
        };

        window.openQuizModal = function(qId) {
            currentActiveQId = qId;
            const qData = quizBank[qId];

            // 퀴즈 오픈 사운드 가동
            sfxOpen.play().catch(e => console.log("Audio play blocked"));

            document.getElementById('modal-qnum').innerText = `QUESTION ${String(qId).padStart(2, '0')}`;
            document.getElementById('modal-category').innerText = qData.cat;
            document.getElementById('modal-difficulty').innerText = `난이도: ${qData.diff}`;
            document.getElementById('modal-content').innerText = qData.q;
            document.getElementById('modal-sample-ans').innerText = qData.ans;
            document.getElementById('sample-answer-box').classList.remove('hidden');

            const liveAnsGrid = document.getElementById('live-answers-grid');
            liveAnsGrid.innerHTML = '';
            for(let t=1; t<=5; t++) {
                const block = document.createElement('div');
                block.id = `live-ans-${t}`;
                block.className = "bg-slate-900 border border-slate-700 p-3 rounded-xl text-center";
                block.innerHTML = `
                    <div class="text-[10px] font-bold text-slate-500 mb-1">${t}조</div>
                    <div class="ans-text text-sm font-black text-slate-300 tracking-wide truncate">대기 중...</div>
                `;
                liveAnsGrid.appendChild(block);
            }

            document.querySelectorAll('#scoring-zone input[type="checkbox"]').forEach(cb => cb.checked = false);

            timeLeft = qData.time;
            totalTimerTime = qData.time;
            updateTimerUI();

            document.getElementById('quiz-modal').classList.remove('hidden');

            update(ref(db, 'game'), { currentQuestion: qId, status: 'playing' });

            isTimerRunning = true;
            document.getElementById('btn-timer-toggle').innerText = "일시정지";
            startTimerInterval();
        };

        function startTimerInterval() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if(isTimerRunning) {
                    timeLeft--;
                    updateTimerUI();

                    // 실시간 타이머 사운드 효과 핸들링
                    if (timeLeft > 5 && timeLeft > 0) {
                        sfxTick.currentTime = 0;
                        sfxTick.play().catch(e => {});
                    } else if (timeLeft <= 5 && timeLeft > 0) {
                        sfxWarning.currentTime = 0;
                        sfxWarning.play().catch(e => {});
                    }

                    if(timeLeft <= 0) {
                        clearInterval(timerInterval);
                        isTimerRunning = false;
                        sfxTimeOver.play().catch(e => {}); // 타임아웃 부저 가동
                        revealAnswers();
                    }
                }
            }, 1000);
        }

        window.toggleTimer = function() {
            isTimerRunning = !isTimerRunning;
            document.getElementById('btn-timer-toggle').innerText = isTimerRunning ? "일시정지" : "재개";
        };

        function updateTimerUI() {
            const min = String(Math.floor(timeLeft / 60)).padStart(2, '0');
            const sec = String(timeLeft % 60).padStart(2, '0');
            document.getElementById('timer-text').innerText = `${min}:${sec}`;
            
            const pct = (timeLeft / totalTimerTime) * 100;
            const pBar = document.getElementById('timer-progress');
            pBar.style.width = `${pct}%`;
            
            if(pct <= 20) pBar.className = "bg-gradient-to-r from-red-500 to-rose-600 h-full transition-all duration-1000 ease-linear";
            else if(pct <= 50) pBar.className = "bg-gradient-to-r from-amber-500 to-orange-500 h-full transition-all duration-1000 ease-linear";
            else pBar.className = "bg-gradient-to-r from-emerald-400 to-blue-500 h-full transition-all duration-1000 ease-linear";
        }

        window.revealAnswers = function() {
            update(ref(db, 'game'), { status: 'showing_answers' });
            get(ref(db, 'teams')).then((snapshot) => {
                const teamsData = snapshot.val() || {};
                for(let t=1; t<=5; t++) {
                    const ansDisplay = document.getElementById(`live-ans-${t}`);
                    if(ansDisplay) {
                        const rawAns = (teamsData[t] && teamsData[t].answers) ? teamsData[t].answers[currentActiveQId] : "";
                        const txtSpan = ansDisplay.querySelector('.ans-text');
                        txtSpan.innerText = rawAns ? rawAns : "[미제출]";
                        txtSpan.classList.remove("text-emerald-400");
                        txtSpan.classList.add("text-yellow-300");
                        txtSpan.dataset.revealed = "true";
                    }
                }
            });
        };

        window.submitScoring = function() {
            let updates = {};
            let checkCount = 0;
            document.querySelectorAll('#scoring-zone input[type="checkbox"]').forEach(cb => {
                const teamId = cb.value;
                if(cb.checked) {
                    updates[`/teams/${teamId}/occupied_cells/${currentActiveQId}`] = true;
                    checkCount++;
                }
            });

            // 정답 처리자가 있을 시 성공 축하 팡파레 효과음 가동
            if(checkCount > 0) {
                sfxBingo.play().catch(e => {});
            }

            update(ref(db), updates).then(() => closeQuizModal(true));
        };

        window.closeQuizModal = function(isFinish) {
            if(timerInterval) clearInterval(timerInterval);
            document.getElementById('quiz-modal').classList.add('hidden');
            currentActiveQId = 0;
            update(ref(db, 'game'), { currentQuestion: 0, status: 'waiting' });
        };

        window.resetGame = function() {
            if(confirm("정말로 모든 데이터를 초기화하시겠습니까?")) {
                if(timerInterval) clearInterval(timerInterval);
                document.getElementById('quiz-modal').classList.add('hidden');
                
                const initData = {
                    game: { currentQuestion: 0, status: 'waiting' },
                    teams: {
                        1: { bingoBoard: [], answers: {0: ""}, occupied_cells: {0: false} },
                        2: { bingoBoard: [], answers: {0: ""}, occupied_cells: {0: false} },
                        3: { bingoBoard: [], answers: {0: ""}, occupied_cells: {0: false} },
                        4: { bingoBoard: [], answers: {0: ""}, occupied_cells: {0: false} },
                        5: { bingoBoard: [], answers: {0: ""}, occupied_cells: {0: false} }
                    }
                };
                set(ref(db), initData).then(() => location.reload());
            }
        };
    </script>
</body>
</html>
